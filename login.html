<!DOCTYPE html>

</head>
<body>

<div class="login-container">
  <h1>SyncSpace</h1>

  <!-- EMAIL LOGIN -->

  <button id="loginBtn">Login</button>

  <div id="status"></div>
</div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="login.js"></script>

</html>
